<!DOCTYPE html>
<html>
<head>
  <style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    padding: 20px;
    background: #0f172a; /* dark premium background */
    color: white;
  }

  h1 {
    font-size: 36px;
    margin-bottom: 20px;
  }

  #app {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .item-card {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .item-title {
    font-size: 26px;
    margin-bottom: 10px;
  }

  .item-desc {
    font-size: 18px;
    opacity: 0.8;
  }

  .bid {
    font-size: 32px;
    font-weight: bold;
    margin: 15px 0;
    color: #22c55e; /* green pop */
  }

  .bid-count {
    font-size: 16px;
    opacity: 0.7;
  }

  button {
    width: 100%;
    font-size: 20px;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.03);
  }

  button:disabled {
    background: #555;
    transform: none;
  }
</style>
  <title>RaiseAura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h1>RaiseAura Auction</h1>


  <div id="app">Loading...</div>

  <script type="module" src="app.js"></script>

</body>
</html>
