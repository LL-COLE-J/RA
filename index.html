<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 20px; /* ~quarter inch spacing */
}

.bid-item {
  width: 100%;
  text-align: center;
max-width: 600px;
margin: 0 auto;
}

.submenu {
  text-align: center;
  margin-bottom: 20px;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  color: #d63384;
  text-align: center;
}

.bid-item {
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  background: linear-gradient(135deg, #d63384, #ff6fa3);
  color: white;
}

.bid-item.winning {
  background: #e8f7ee;
  color: black;
  border: 2px solid #28a745;
}

button {
  background: #d63384;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}

input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.winning div:first-child {
  font-size: 16px;
}

.bid-item img {
  transition: transform 0.2s ease;
}

.bid-item:hover img {
  transform: scale(1.03);
}

</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="goHome()">🏠 Home</button>
</div>

<div id="auctionPage">

  <!-- USER BAR (NEW) -->
  <div style="text-align:center; margin-bottom:20px;">
    <strong id="userInfo"></strong>
  </div>

  <!-- AUCTION ITEMS -->
  <div id="auctionItems"></div>

</div>




<script>

console.log("AUCTION VERSION 2");

let currentItems = [];
let isInteracting = false;
let previousWinners = {};

// ===== USER FROM CHECK-IN =====
const params = new URLSearchParams(window.location.search);

const rawName = params.get("name") || "";

const cleanName = decodeURIComponent(rawName).replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};




// ===== RENDER ITEMS (FIXED) =====
function renderItems(items) {

  const div = document.getElementById("auctionItems");

  if (!div) {
    console.error("Missing #auctionItems");
    return;
  }

  if (!items || items.length === 0) {
    div.innerHTML = "<p>No items available</p>";
    return;
  }

  div.innerHTML = "";

  items
    .filter(i => i && (i.name || i.ItemName))
    .filter(i => {
      const status = (i.status || "")
        .toString()
        .trim()
        .toLowerCase();
      return status === "open" || status === "";
    })
    .sort((a, b) => (parseFloat(b.current_bid) || 0) - (parseFloat(a.current_bid) || 0))
    .forEach(item => {

      const name = item.name || item.ItemName;
      const id = item.item_id || item.ItemID;
      const currentBid = parseFloat(item.current_bid) || 0;
      const winner = item.current_winner || "-";
const image = item.image || "";


// 🔥 OUTBID DETECTION (FIXED)
const wasWinning = String(previousWinners[id]) === String(currentBidder);
const isWinningNow = String(item.current_winner) === String(currentBidder);

if (wasWinning && !isWinningNow && !previousWinners[`alerted_${id}`]) {
  alert(`⚠️ You’ve been outbid on ${name}!`);
  previousWinners[`alerted_${id}`] = true;
}

      const nextBid = currentBid + 50;



const card = document.createElement("div");
card.className = "bid-item";

// 🔥 check if winning
const isWinning = String(item.current_winner) === String(currentBidder);
// reset alert if user is winning again
if (isWinning) {
  previousWinners[`alerted_${id}`] = false;
}

if (isWinning) {
  card.classList.add("winning");
}

    card.innerHTML = `
  ${isWinning ? `
    <div style="font-weight:bold; color:#155724;font-size:16px; margin-bottom:8px;">
      🏆 YOU ARE WINNING
    </div>
  ` : ""}

 ${image ? `
  <img src="${image}" 
     onerror="this.style.display='none';"
     style="width:100%; height:150px; object-fit:cover; border-radius:10px; margin-bottom:10px;">
` : ""}

<div style="font-size:18px; font-weight:bold; margin-bottom:8px;">
  ${name}
</div>

  <div style="margin-bottom:10px;">
  Current: <strong>$${currentBid}</strong><br>
  Leader: ${winner}<br>
  <div style="font-size:12px; opacity:0.8;">
    Min Next Bid: $${nextBid}
  </div>
</div>

 <button onclick="console.log('CLICK WORKING'); placeQuickBid('${id}', ${nextBid}, this)">
    Bid $${nextBid}
  </button>

  <div style="margin-top:10px;">
    <input 
  id="input-${id}" 
  type="number" 
  placeholder="Custom bid"
  onfocus="isInteracting = true"
  onblur="isInteracting = false"
>
    <button onclick="placeCustomBid('${id}', this)">Submit</button>
  </div>

  <div id="status-${id}" style="margin-top:8px;"></div>
`;

previousWinners[id] = item.current_winner;

      div.appendChild(card);
    });
}

const SCRIPT_URL = "https://cool-dawn-c169.llcolej8.workers.dev/";


let currentGuest = user.name;
console.log("CURRENT GUEST VALUE:", currentGuest);
let currentBidder = user.bidderId;
let currentTable = user.table;

async function placeCustomBid(id, btn){

  if (btn.disabled) return;
  btn.disabled = true;

  const statusEl = document.getElementById(`status-${id}`);
  statusEl.innerText = "Submitting...";

  const inputEl = document.getElementById(`input-${id}`);
  const val = Number(inputEl.value);

  if(!val){
    btn.disabled = false;
    return alert("Enter bid");
  }

  let item = currentItems.find(i => i.item_id == id);
  const current = Number(item?.current_bid) || 0;

  if (val <= current) {
    btn.disabled = false;
    return alert(`Bid must be greater than $${current}`);
  }

  try {
console.log("FULL PAYLOAD:", {
  bidder_name: currentGuest,
  bidder_id: currentBidder
});

   await fetch(SCRIPT_URL, {
  method: "POST",
  body: new URLSearchParams({
    bid: true,
    item_id: id,
    bidder_id: currentBidder,
    bidder_name: currentGuest,   // ✅ ADD THIS
    amount: val
  })
});

    // assume success
    statusEl.innerHTML = "<span style='color:lightgreen;'>🏆 You are winning!</span>";

    if (item) {
      item.current_bid = val;
      item.current_winner = currentBidder;
    }

    renderItems(currentItems);

    inputEl.value = "";

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;
  fetchItems();
}




// ===== FETCH ITEMS =====
async function fetchItems(){

  const res = await fetch(`${SCRIPT_URL}?items=true`);

  const text = await res.text(); // 👈 important
  console.log("RAW:", text);

  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    console.error("JSON parse failed:", e);
    return;
  }

  console.log("PARSED:", data);

  currentItems = data;

  console.log("FINAL ITEMS:", currentItems);

  renderItems(currentItems);
}

// ===== BID =====
async function placeQuickBid(id, amt, btn){

  if (btn.disabled) return;

  const statusEl = document.getElementById(`status-${id}`);

  btn.disabled = true;

  // 🔵 STEP 1: show submitting
  statusEl.innerText = "Submitting...";

  // ⚡ STEP 2: instant UI update
  const item = currentItems.find(i => i.item_id == id);
  if (item) {
    item.current_bid = amt;
    item.current_winner = currentBidder;
  }

  renderItems(currentItems);

  try {

    // 🧠 THIS = "fetch succeeds" point
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        bid: true,
        item_id: id,
        bidder_id: currentBidder,
        bidder_name: currentGuest,  
        amount: amt
      })
    });

    // 🟢 STEP 3: success AFTER server confirms
    statusEl.innerHTML = "<span style='color:lightgreen;'>🏆 You are winning!</span>";

  } catch (err) {
    statusEl.innerText = "⚠️ Error";
    console.error(err);
  }

  btn.disabled = false;
  fetchItems();
}
  
function goHome(){
  window.location.href = "/";
}

window.onload = () => {

  console.log("Auction loaded for:", user);

  // Show user info
  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  // Initial load
  fetchItems();

  // 🔥 AUTO REFRESH EVERY 3 SECONDS
  setInterval(() => {
  if (!isInteracting) {
    fetchItems();
  }
}, 3000);

}

</script>
</body>
</html>
