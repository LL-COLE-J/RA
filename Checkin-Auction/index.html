<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:,">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<title>Pink Gala Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:20px;
  text-align:center;
  background:linear-gradient(135deg,#fff0f6,#ffe3ec);
}

.mainCard{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

h1{ color:#d63384; }

.tableCard{
  margin-top:30px;
  padding:50px 20px;
  background:linear-gradient(135deg,#d63384,#ff66a3);
  color:white;
  border-radius:18px;
}

.tableNumber{ font-size:120px; }
.bidderNumber{ font-size:32px; }
.welcomeName{ font-size:28px; }

input{
  padding:20px;
  font-size:24px;
  width:100%;
  max-width:420px;
  border-radius:10px;
  box-sizing:border-box;
  margin:0 auto;
  display:block;
  border:1px solid #ddd;
}

button{
  margin-top:15px;
  padding:18px;
  font-size:22px;
  width:100%;
  background:#d63384;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{ opacity:0.9; }

/* RESULT CARDS */
.result{
  margin-top:10px;
  padding:18px;
  font-size:20px;
  background:#d63384;
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.result:hover{
  opacity:0.85;
}

.result.checked{
  background:#28a745;
}

/* STATUS */
.status{
  margin-top:15px;
  font-size:18px;
  font-weight:600;
}

.status.success{ color:green; }
.status.warn{ color:orange; }
.status.error{ color:red; }
</style>
</head>

<body>

<div class="mainCard">

<div style="font-size:60px;margin-bottom:10px;color:#d63384;">🎗️</div>

<h1>2026 Pink Gala Check-In</h1>

<input id="searchInput" placeholder="Start typing guest name..." autofocus />

<div id="guestList"></div>

<div id="loading">Loading guest list...</div>
<div id="status" class="status"></div>

</div>

<script>

const SCRIPT_URL = "https://cool-dawn-c169.llcolej8.workers.dev/";

let guestList = [];
const guestMap = {};
const checkedInSet = new Set();

const checkInQueue = [];
let isProcessing = false;

/* LOAD GUESTS */
async function loadGuests() {
  try {
    const res = await fetch(`${SCRIPT_URL}?guests=true`);
    const data = await res.json();

    guestList = data.map((g, i) => ({
      id: i.toString(),
      name: g.name,
      bidder: g.bidder,
      table: g.table,
      checked: g.CheckedIn === "YES"
    }));

    guestList.forEach(g => guestMap[g.id] = g);

    renderList([]);

    document.getElementById("loading").style.display = "none";

    const status = document.getElementById("status");
    status.innerText = "Enter name";
    status.className = "status success";

  } catch {
    document.getElementById("loading").innerText = "FAILED TO LOAD";
  }
}

/* RENDER */
function renderList(list) {
  const container = document.getElementById("guestList");
  container.innerHTML = "";

  list.forEach(g => {
    const div = document.createElement("div");

    div.className = "result" + (g.checked ? " checked" : "");
    div.onclick = () => handleCheckIn(g.id);

    const status = g.checked ? " ✔ Checked In" : "";

    div.innerHTML = `${g.name}${status}`;

    container.appendChild(div);
  });
}

/* SEARCH */
function debounce(fn, delay = 200) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

function handleSearch(e) {
  const term = (e.target.value || "").toLowerCase().trim();
  const status = document.getElementById("status");

  if (!term) {
    renderList([]);
    status.innerText = "Enter name";
    status.className = "status success";
    return;
  }

  const filtered = guestList
    .filter(g => (g.name || "").toLowerCase().includes(term))
    .slice(0, 10);

  renderList(filtered);

  status.innerText = `${filtered.length} match(es)`;
}

/* CHECK-IN */
function handleCheckIn(id) {

  if (checkedInSet.has(id)) return;

  checkedInSet.add(id);
  queueCheckIn({ id });

  setTimeout(() => checkedInSet.delete(id), 10000);

  const guest = guestMap[id];

  document.getElementById("guestList").innerHTML = `
    <div class="tableCard" onclick="resetCheckIn()"> 
      <div class="welcomeName">${guest.name}</div>
      <div class="tableNumber">${guest.table || "-"}</div>
      <div class="bidderNumber">Bidder #${guest.bidder || "-"}</div>

      <div style="margin-top:15px;font-size:20px;">
        ✅ Checked In
      </div>

      <<button onclick="event.stopPropagation(); enterAuction('${guest.name}', '${guest.bidder}', '${guest.table}')">
        Enter Auction
      </button>
    </div>
  `;

  confetti({ particleCount:60, spread:70, origin:{y:0.6} });

  setTimeout(() => {
  if (!document.hidden) resetCheckIn();
}, 8000);
}

/* QUEUE */
const BATCH_SIZE = 20;

function queueCheckIn(data) {
  checkInQueue.push(data);
  processQueue();
}

async function processQueue() {
  if (isProcessing) return;
  isProcessing = true;

  while (checkInQueue.length) {
    const batch = checkInQueue.splice(0, BATCH_SIZE);
    try {
      await sendBatch(batch);
      await new Promise(r => setTimeout(r, 75));
    } catch {
      checkInQueue.push(...batch);
    }
  }

  isProcessing = false;
}

async function sendBatch(batch) {
  const ids = batch.map(b => String(b.id));

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: new URLSearchParams({ ids: JSON.stringify(ids) })
  });
}

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("searchInput");
  input.addEventListener("input", debounce(handleSearch));

  input.addEventListener("keypress", e => {
    if (e.key === "Enter") {
      const term = input.value.toLowerCase().trim();
      const match = guestList.find(g => g.name.toLowerCase().includes(term));
      if (match) handleCheckIn(match.id);
    }
  });

  loadGuests();
});

function resetCheckIn() {
  document.getElementById("guestList").innerHTML = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("searchInput").focus();
}

function enterAuction(name, bidder, table) {
  window.location.href =
    `/auction.html?name=${encodeURIComponent(name)}&bidder=${bidder}&table=${table}`;
}

</script>

</body>
</html>
