<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  color: #d63384;
  text-align: center;
}

#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bid-item {
  border-radius: 12px;
  padding: 20px;
  background: linear-gradient(135deg, #d63384, #ff6fa3);
  color: white;
  max-width: 600px;
  margin: 0 auto;
  transition: box-shadow 0.3s ease;
}

.bid-item.winning {
  background: #e8f7ee;
  color: black;
  border: 2px solid #28a745;
}

.bid-item.highlight {
  box-shadow: 0 0 15px gold;
}

.bid-item.losing {
  opacity: 0.85;
}

button {
  background: #d63384;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}

input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100px;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="goHome()">🏠 Home</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
  <strong id="userInfo"></strong>
</div>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="toggleMyBids()" id="myBidsBtn">My Bids</button>
</div>

<div id="auctionItems"></div>

<script>

// ===== USER =====
const params = new URLSearchParams(window.location.search);
const cleanName = decodeURIComponent(params.get("name") || "").replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};

let currentBidder = user.bidderId;
let currentGuest = user.name;

// ===== STATE =====
let currentItems = [];
let itemMap = {};
let lastDataHash = "";
let myBids = {};
let pendingBids = {};
let lockedItems = {};
let showMineOnly = false;

// ===== CONFIG =====
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

// ===== TOAST =====
function showToast(msg) {
  const t = document.createElement("div");
  t.innerText = msg;
  t.style = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px;border-radius:8px;";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ===== RENDER =====
function renderItems(items) {
  const div = document.getElementById("auctionItems");

  items.forEach(item => {

    const id = item.item_id;
    let card = itemMap[id];

    if (!card) {
      card = document.createElement("div");
      card.className = "bid-item";
      itemMap[id] = card;
      div.appendChild(card);
    }

    const currentBid = Number(item.current_bid) || Number(item.starting_bid) || 0;
    const winner = item.current_winner || "-";
    const image = item.image || "";

    const isWinning = String(winner) === String(currentBidder);
    const hasBid = myBids[id];
    const isPending = pendingBids[id];
    const isLocked = lockedItems[id];

    const increment = Number(item.min_increment) || 50;
    const nextBid = currentBid + increment;

    card.className = "bid-item";
    if (isWinning) card.classList.add("winning");
    if (!isWinning && hasBid && !isPending && !isLocked) {
      card.classList.add("losing");
    }

    card.innerHTML = `
      ${isWinning ? `<div style="font-weight:bold;color:#155724;">🏆 YOU ARE WINNING</div>` : ""}
      ${isPending ? `<div style="font-weight:bold;">⏳ SUBMITTING BID...</div>` : ""}
      ${!isWinning && hasBid && !isPending && !isLocked ? `<div style="font-weight:bold;color:#ffc107;">⚠️ YOU ARE LOSING</div>` : ""}

      ${image ? `<img src="${image}" loading="lazy">` : `<div style="height:150px;background:#ffd6e8;display:flex;align-items:center;justify-content:center;">🎁</div>`}

      <div style="font-size:18px;font-weight:bold;">${item.name}</div>

      <div>
        Current: <strong>$${currentBid}</strong><br>
        Leader: ${winner}<br>
        <small>Min Next Bid: $${nextBid}</small>
      </div>

      <button onclick="placeQuickBid('${id}', ${nextBid}, this)">Bid $${nextBid}</button>

      <input id="input-${id}" type="number">
      <button onclick="placeCustomBid('${id}', this)">Submit</button>

      <div id="status-${id}"></div>
    `;
  });
}

// ===== FETCH =====
async function fetchItems() {
  const res = await fetch(`${SCRIPT_URL}?items=true`);
  const text = await res.text();

  if (text === lastDataHash) return;

  lastDataHash = text;
  currentItems = JSON.parse(text);
  renderItems(currentItems);
}

// ===== BIDDING =====
async function placeQuickBid(id, amt, btn) {

  if (!confirm(`Place bid of $${amt}?`)) return;

  btn.disabled = true;

  pendingBids[id] = true;
  myBids[id] = true;
  lockedItems[id] = true;

  renderItems(currentItems);

  await fetch(SCRIPT_URL, {
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      bidder_id:currentBidder,
      bidder_name:currentGuest,
      amount:amt
    })
  });

  delete pendingBids[id];
  delete lockedItems[id];

  btn.disabled = false;
  fetchItems();
}

async function placeCustomBid(id, btn) {

  const val = Number(document.getElementById(`input-${id}`).value);
  if (!val) return showToast("Enter bid");

  if (!confirm(`Place bid of $${val}?`)) return;

  btn.disabled = true;

  pendingBids[id] = true;
  myBids[id] = true;
  lockedItems[id] = true;

  renderItems(currentItems);

  await fetch(SCRIPT_URL, {
    method:"POST",
    body:new URLSearchParams({
      bid:true,
      item_id:id,
      bidder_id:currentBidder,
      bidder_name:currentGuest,
      amount:val
    })
  });

  delete pendingBids[id];
  delete lockedItems[id];

  btn.disabled = false;
  fetchItems();
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  fetchItems();

  setInterval(() => {
    if (Object.keys(lockedItems).length === 0) {
      fetchItems();
    }
  }, 2000);
});

function goHome(){
  window.location.href = "/";
}

</script>
</body>
</html>
