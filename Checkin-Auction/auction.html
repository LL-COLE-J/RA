<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  color: #d63384;
  text-align: center;
}

#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bid-item {
  border-radius: 12px;
  padding: 20px;
  background: linear-gradient(135deg, #d63384, #ff6fa3);
  color: white;
  max-width: 600px;
  margin: 0 auto;
  transition: box-shadow 0.3s ease;
}

.bid-item.winning {
  background: #e8f7ee;
  color: black;
  border: 2px solid #28a745;
}

.bid-item.highlight {
  box-shadow: 0 0 15px gold;
}

button {
  background: #d63384;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}

input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100px;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="goHome()">🏠 Home</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
  <strong id="userInfo"></strong>
</div>

<div id="auctionItems"></div>

<script>

console.log("AUCTION V3 LOADED");

// ===== USER =====
const params = new URLSearchParams(window.location.search);

const rawName = params.get("name") || "";
const cleanName = decodeURIComponent(rawName).replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};

let currentBidder = user.bidderId;
let currentGuest = user.name;

// ===== STATE =====
let currentItems = [];
let previousWinners = {};
let lastBids = {};
let isInteracting = false;
let lastFetch = 0;

// ===== TOAST =====
function showToast(msg) {
  const toast = document.createElement("div");
  toast.innerText = msg;

  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = "#333";
  toast.style.color = "#fff";
  toast.style.padding = "12px 18px";
  toast.style.borderRadius = "8px";
  toast.style.zIndex = "9999";

  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== RENDER =====
function renderItems(items) {

  const div = document.getElementById("auctionItems");
  div.innerHTML = "";

  items
    .filter(i => (i.status || "").toLowerCase() !== "closed")
    .sort((a, b) => (b.current_bid || 0) - (a.current_bid || 0))
    .forEach(item => {

      const id = item.item_id;
      const name = item.name;
      const currentBid = Number(item.current_bid) || 0;
      const winner = item.current_winner || "-";
      const image = item.image || "";

      const isWinning = String(winner) === String(currentBidder);
      const wasWinning = String(previousWinners[id]) === String(currentBidder);

      // 🔔 OUTBID DETECTION
      if (wasWinning && !isWinning && !previousWinners[`alerted_${id}`]) {
        showToast(`⚠️ Outbid on ${name}`);
        previousWinners[`alerted_${id}`] = true;
      }

      if (isWinning) {
        previousWinners[`alerted_${id}`] = false;
      }

      const nextBid = currentBid + 50;

      const card = document.createElement("div");
      card.className = "bid-item";

      if (isWinning) card.classList.add("winning");

      // ✨ highlight change
      if (lastBids[id] && lastBids[id] !== currentBid) {
        card.classList.add("highlight");
      }
      lastBids[id] = currentBid;

      card.innerHTML = `
        ${isWinning ? `<div style="font-weight:bold;color:#155724;">🏆 YOU ARE WINNING</div>` : ""}

        <img src="${image}" 
             onerror="this.src='https://via.placeholder.com/400x150?text=No+Image'">

        <div style="font-size:18px;font-weight:bold;">${name}</div>

        <div>
          Current: <strong>$${currentBid}</strong><br>
          Leader: ${winner}<br>
          <small>Min Next Bid: $${nextBid}</small>
        </div>

        <button onclick="placeQuickBid('${id}', ${nextBid}, this)">
          Bid $${nextBid}
        </button>

        <div style="margin-top:10px;">
          <input id="input-${id}" type="number"
            onfocus="isInteracting=true"
            onblur="isInteracting=false">
          <button onclick="placeCustomBid('${id}', this)">Submit</button>
        </div>

        <div id="status-${id}"></div>
      `;

      previousWinners[id] = winner;

      div.appendChild(card);
    });
}

// ===== FETCH =====
const SCRIPT_URL = "https://cool-dawn-c169.llcolej8.workers.dev/";

async function fetchItems() {
  try {
    const res = await fetch(`${SCRIPT_URL}?items=true`);
    const data = await res.json();
    currentItems = data;
    renderItems(currentItems);
  } catch (e) {
    console.error(e);
  }
}

// ===== QUICK BID =====
async function placeQuickBid(id, amt, btn) {

  if (btn.disabled) return;

  if (!confirm(`Place bid of $${amt}?`)) return;

  btn.disabled = true;

  const statusEl = document.getElementById(`status-${id}`);
  statusEl.innerText = "Submitting...";

  // ⚡ optimistic update
  const item = currentItems.find(i => i.item_id == id);
  if (item) {
    item.current_bid = amt;
    item.current_winner = currentBidder;
  }

  renderItems(currentItems);

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        bid: true,
        item_id: id,
        bidder_id: currentBidder,
        bidder_name: currentGuest,
        amount: amt
      })
    });

    statusEl.innerHTML = "🏆 Winning!";

  } catch (e) {
    statusEl.innerText = "Error";
  }

  btn.disabled = false;
  fetchItems();
}

// ===== CUSTOM BID =====
async function placeCustomBid(id, btn) {

  if (btn.disabled) return;

  const input = document.getElementById(`input-${id}`);
  const val = Number(input.value);

  if (!val) return showToast("Enter bid");

  const item = currentItems.find(i => i.item_id == id);
  const current = Number(item?.current_bid) || 0;

  if (val <= current) return showToast(`Bid must exceed $${current}`);

  if (!confirm(`Place bid of $${val}?`)) return;

  btn.disabled = true;

  const statusEl = document.getElementById(`status-${id}`);
  statusEl.innerText = "Submitting...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        bid: true,
        item_id: id,
        bidder_id: currentBidder,
        bidder_name: currentGuest,
        amount: val
      })
    });

    statusEl.innerHTML = "🏆 Winning!";

  } catch (e) {
    statusEl.innerText = "Error";
  }

  btn.disabled = false;
  fetchItems();
}

// ===== INIT =====
function goHome(){
  window.location.href = "/";
}

window.onload = () => {

  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  fetchItems();

  // 🔥 smarter polling
  setInterval(() => {
    const now = Date.now();
    if (!isInteracting && now - lastFetch > 5000) {
      fetchItems();
      lastFetch = now;
    }
  }, 2000);
};

</script>
</body>
</html>
