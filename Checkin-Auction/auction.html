<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>2026 Pink Gala Auction</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  color: #d63384;
  text-align: center;
}

#auctionItems {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bid-item {
  border-radius: 12px;
  padding: 20px;
  background: linear-gradient(135deg, #d63384, #ff6fa3);
  color: white;
  max-width: 600px;
  margin: 0 auto;
}

.bid-item.winning {
  background: #e8f7ee;
  color: black;
  border: 2px solid #28a745;
}

.bid-item.highlight {
  box-shadow: 0 0 15px gold;
}

.bid-item.losing {
  opacity: 0.85;
}

button {
  background: #d63384;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}

input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100px;
}
</style>
</head>

<body>

<h1>2026 Pink Gala Auction</h1>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="goHome()">🏠 Home</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
  <strong id="userInfo"></strong>
</div>

<div style="text-align:center; margin-bottom:15px;">
  <button onclick="toggleMyBids()" id="myBidsBtn">My Bids</button>
</div>

<div id="auctionItems"></div>

<script>

// ===== USER =====
const params = new URLSearchParams(window.location.search);
const cleanName = decodeURIComponent(params.get("name") || "").replace(/\+/g, " ");

const user = {
  name: cleanName || "Bidder " + params.get("bidder"),
  bidderId: params.get("bidder"),
  table: params.get("table")
};

let currentBidder = user.bidderId;
let currentGuest = user.name;

// ===== STATE =====
let currentItems = [];
let previousWinners = {};
let lastBids = {};
let myBids = {};
let showMineOnly = false;
let isInteracting = false;
let lastFetch = 0;

// ===== TOAST =====
function showToast(msg) {
  const t = document.createElement("div");
  t.innerText = msg;
  t.style = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 18px;border-radius:8px;z-index:9999;";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ===== TOGGLE =====
function toggleMyBids() {
  showMineOnly = !showMineOnly;
  document.getElementById("myBidsBtn").innerText = showMineOnly ? "Showing: My Bids" : "My Bids";
  renderItems(currentItems);
}

// ===== RENDER =====
function renderItems(items) {
  const div = document.getElementById("auctionItems");
  div.innerHTML = "";

  items
    .filter(item => {
      if (!showMineOnly) return true;
      return String(item.current_winner) === String(currentBidder) || myBids[item.item_id];
    })
    .sort((a,b) => (b.current_bid||0) - (a.current_bid||0))
    .forEach(item => {

      const id = item.item_id;
      const currentBid = Number(item.current_bid) || Number(item.starting_bid) || 0;
      const winner = item.current_winner || "-";

      const isWinning = String(winner) === String(currentBidder);
      const wasWinning = String(previousWinners[id]) === String(currentBidder);

      if (wasWinning && !isWinning && !previousWinners[`alerted_${id}`]) {
        showToast(`⚠️ Outbid on ${item.name}`);
        previousWinners[`alerted_${id}`] = true;
      }

      if (isWinning) previousWinners[`alerted_${id}`] = false;

      const increment = Number(item.min_increment) || 50;
      const nextBid = currentBid + increment;

      const card = document.createElement("div");
      card.className = "bid-item";
      if (isWinning) card.classList.add("winning");
      if (!isWinning && myBids[id]) card.classList.add("losing");

      card.innerHTML = `
        ${isWinning ? `<div>🏆 YOU ARE WINNING</div>` : ""}
        ${!isWinning && myBids[id] ? `<div>⚠️ YOU ARE LOSING</div>` : ""}
        <div><b>${item.name}</b></div>
        <div>Current: $${currentBid} | Leader: ${winner}</div>
        <div><small>Next: $${nextBid}</small></div>

        ${item.status !== "open"
          ? `<button disabled>Closed</button>`
          : `<button onclick="placeQuickBid('${id}', ${nextBid}, this)">Bid $${nextBid}</button>`
        }

        <input id="input-${id}" type="number">
        <button onclick="placeCustomBid('${id}', this)">Submit</button>

        <div id="status-${id}"></div>
      `;

      previousWinners[id] = winner;
      div.appendChild(card);
    });
}

// ===== FETCH =====
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjcBzFLO9XFpkWhbTLaRdG4DqpAbrvmnEPc9EwwG6eTwfG73UTQGZD2-U10aeUCV-6/exec";

async function fetchItems() {
  const res = await fetch(`${SCRIPT_URL}?items=true`, { cache:"no-store" });
  currentItems = await res.json();
  renderItems(currentItems);
}

// ===== QUICK BID =====
async function placeQuickBid(id, amt, btn) {

  await fetchItems(); // 🔥 sync first

  const latest = currentItems.find(i => i.item_id == id);
  const latestBid = Number(latest?.current_bid) || 0;

  if (amt <= latestBid) {
    showToast("Already outbid — try higher");
    return;
  }

  if (!confirm(`Bid $${amt}?`)) return;

  btn.disabled = true;
  const status = document.getElementById(`status-${id}`);
  status.innerText = "Submitting...";

  myBids[id] = true;
  renderItems(currentItems);

  await fetch(SCRIPT_URL, {
    method:"POST",
    body: new URLSearchParams({
      bid:true,
      item_id:id,
      bidder_id:currentBidder,
      bidder_name:currentGuest,
      amount:amt
    })
  });

  status.innerText = "⏳ Processing...";
  btn.disabled = false;
  fetchItems();
}

// ===== CUSTOM BID =====
async function placeCustomBid(id, btn) {

  const input = document.getElementById(`input-${id}`);
  const val = Number(input.value);

  if (!val) return showToast("Enter bid");

  await fetchItems();

  const latest = currentItems.find(i => i.item_id == id);
  const latestBid = Number(latest?.current_bid) || 0;
  const increment = Number(latest?.min_increment) || 50;

  if (val < latestBid + increment) {
    return showToast(`Minimum bid is $${latestBid + increment}`);
  }

  if (!confirm(`Bid $${val}?`)) return;

  btn.disabled = true;
  const status = document.getElementById(`status-${id}`);
  status.innerText = "Submitting...";

  myBids[id] = true;

  await fetch(SCRIPT_URL, {
    method:"POST",
    body: new URLSearchParams({
      bid:true,
      item_id:id,
      bidder_id:currentBidder,
      bidder_name:currentGuest,
      amount:val
    })
  });

  status.innerText = "⏳ Processing...";
  btn.disabled = false;
  fetchItems();
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("userInfo").innerText =
    `${user.name} | Bidder #${user.bidderId} | Table ${user.table}`;

  fetchItems();

  setInterval(() => {
    const now = Date.now();
    if (!isInteracting && now - lastFetch > 2000) {
      fetchItems();
      lastFetch = now;
    }
  }, 1000);
});

function goHome(){
  window.location.href = "/";
}

</script>
</body>
</html>
